<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SYSTEM://MEMORY</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  font-family: 'IBM Plex Mono', monospace;
  color: #00ff99;
  overflow: hidden;
}

/* DESKTOP */
.desktop {
  width: 100vw;
  height: 100vh;
  background: radial-gradient(#020202, #000);
  position: relative;
}

/* ÍCONES */
.icon {
  width: 80px;
  text-align: center;
  cursor: pointer;
  position: absolute;
  color: #aaa;
}

.icon img {
  width: 50px;
}

.icon:hover {
  color: #00ff99;
}

/* JANELA */
.window {
  width: 500px;
  height: 400px;
  background: #111;
  border: 2px solid #00ff99;
  position: absolute;
  top: 50px;
  left: 50px;
  display: none;
  flex-direction: column;
}

/* HEADER */
.window-header {
  background: #00ff99;
  color: black;
  padding: 5px;
  cursor: move;
  display: flex;
  justify-content: space-between;
}

/* CONTEÚDO */
.window-content {
  padding: 10px;
  overflow-y: auto;
  flex: 1;
}

/* POSTS */
.post {
  border-bottom: 1px solid #333;
  margin-bottom: 10px;
  padding-bottom: 10px;
}

/* INPUT */
textarea {
  width: 100%;
  background: black;
  color: #00ff99;
  border: 1px solid #00ff99;
  margin-top: 10px;
}

button {
  width: 100%;
  background: black;
  color: #00ff99;
  border: 1px solid #00ff99;
  margin-top: 5px;
  cursor: pointer;
}

/* TASKBAR */
.taskbar {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: #111;
  padding: 5px;
  border-top: 1px solid #00ff99;
  font-size: 12px;
}

</style>
</head>

<body>

<div class="desktop">

  <!-- ÍCONES -->
  <div class="icon" style="top:40px; left:40px;" onclick="openWindow()">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Human_brain.png">
    <div>memories</div>
  </div>

  <!-- JANELA -->
  <div class="window" id="window">
    <div class="window-header">
      <span>memory.log</span>
      <span onclick="closeWindow()">X</span>
    </div>

    <div class="window-content">
      <div id="posts"></div>

      <textarea id="input"></textarea>
      <button onclick="addPost()">salvar</button>
    </div>
  </div>

  <!-- TASKBAR -->
  <div class="taskbar">
    SYSTEM ONLINE // emocional instável
  </div>

</div>

<script>

/* abrir/fechar */
function openWindow() {
  document.getElementById("window").style.display = "flex";
}

function closeWindow() {
  document.getElementById("window").style.display = "none";
}

/* posts */
function addPost() {
  const text = document.getElementById("input").value;
  if (!text.trim()) return;

  const post = document.createElement("div");
  post.className = "post";
  post.innerText = text;

  document.getElementById("posts").prepend(post);

  let saved = JSON.parse(localStorage.getItem("posts") || "[]");
  saved.unshift(text);
  localStorage.setItem("posts", JSON.stringify(saved));

  document.getElementById("input").value = "";
}

window.onload = () => {
  let saved = JSON.parse(localStorage.getItem("posts") || "[]");
  saved.forEach(text => {
    const post = document.createElement("div");
    post.className = "post";
    post.innerText = text;
    document.getElementById("posts").appendChild(post);
  });
}

/* arrastar janela */
const win = document.getElementById("window");
const header = document.querySelector(".window-header");

let offsetX = 0, offsetY = 0, isDown = false;

header.onmousedown = (e) => {
  isDown = true;
  offsetX = win.offsetLeft - e.clientX;
  offsetY = win.offsetTop - e.clientY;
};

document.onmouseup = () => isDown = false;

document.onmousemove = (e) => {
  if (!isDown) return;
  win.style.left = (e.clientX + offsetX) + "px";
  win.style.top = (e.clientY + offsetY) + "px";
};

</script>

</body>
</html>
