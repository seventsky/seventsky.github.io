<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>arquivo.exe</title>

<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Mono&display=swap" rel="stylesheet">

<style>
body {
  background: #0d0d0d;
  color: #d0d0d0;
  font-family: 'Special Elite', serif;
  display: flex;
  justify-content: center;
  margin: 0;
}

.container {
  width: 600px;
  padding: 40px 20px;
}

header {
  text-align: center;
  margin-bottom: 40px;
}

header h1 {
  font-size: 26px;
  letter-spacing: 2px;
  color: #e4e4e4;
}

header p {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: #6a6a6a;
}

.post {
  border-left: 2px solid #444;
  padding: 15px;
  margin-bottom: 25px;
  transition: 0.3s;
}

.post:hover {
  border-left: 2px solid #00ff99;
  background: rgba(255,255,255,0.02);
}

.date {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: #555;
  margin-bottom: 8px;
}

.content {
  font-size: 15px;
  line-height: 1.6;
}

textarea {
  width: 100%;
  height: 90px;
  background: #111;
  color: #ccc;
  border: 1px solid #333;
  padding: 10px;
  margin-top: 20px;
  font-family: 'IBM Plex Mono', monospace;
}

button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  background: #111;
  color: #aaa;
  border: 1px solid #333;
  cursor: pointer;
}

button:hover {
  color: #00ff99;
  border-color: #00ff99;
}

footer {
  text-align: center;
  margin-top: 40px;
  font-size: 11px;
  color: #444;
}

/* glitch leve */
.glitch {
  position: relative;
  display: inline-block;
}

.glitch::after {
  content: attr(data-text);
  position: absolute;
  left: 2px;
  top: 0;
  color: #ff00c8;
  opacity: 0.5;
}

</style>
</head>

<body>

<div class="container">

<header>
  <h1 class="glitch" data-text="arquivo.exe">arquivo.exe</h1>
  <p>memórias corrompidas // 2003-2026</p>
</header>

<div id="posts"></div>

<textarea id="input" placeholder="escreve algo..."></textarea>
<button onclick="addPost()">publicar</button>

<footer>
  sistema instável
</footer>

</div>

<script>
function addPost() {
  const text = document.getElementById("input").value;
  if (!text.trim()) return;

  const date = new Date().toLocaleString();

  const post = document.createElement("div");
  post.className = "post";
  post.innerHTML = `
    <div class="date">${date}</div>
    <div class="content">${text}</div>
  `;

  document.getElementById("posts").prepend(post);

  let saved = JSON.parse(localStorage.getItem("posts") || "[]");
  saved.unshift({text, date});
  localStorage.setItem("posts", JSON.stringify(saved));

  document.getElementById("input").value = "";
}

window.onload = () => {
  let saved = JSON.parse(localStorage.getItem("posts") || "[]");
  saved.forEach(p => {
    const post = document.createElement("div");
    post.className = "post";
    post.innerHTML = `
      <div class="date">${p.date}</div>
      <div class="content">${p.text}</div>
    `;
    document.getElementById("posts").appendChild(post);
  });
}
</script>

</body>
</html>
