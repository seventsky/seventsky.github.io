<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>system://core</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #050505;
  font-family: 'VT323', monospace;
  color: #00ffcc;
  overflow: hidden;
}

/* DESKTOP */
.desktop {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* ÍCONES */
.icon {
  width: 80px;
  text-align: center;
  cursor: pointer;
  position: absolute;
  color: #aaa;
}

.icon img {
  width: 48px;
}

.icon:hover {
  color: #00ffcc;
}

/* JANELA */
.window {
  width: 520px;
  height: 400px;
  background: #0d0d0d;
  border: 1px solid #00ffcc;
  box-shadow: 0 0 15px #00ffcc33;
  position: absolute;
  top: 80px;
  left: 80px;
  display: none;
  flex-direction: column;
}

/* HEADER */
.header {
  background: #00ffcc;
  color: black;
  padding: 5px;
  cursor: move;
  display: flex;
  justify-content: space-between;
}

/* BOTÃO */
.close {
  cursor: pointer;
}

/* CONTEÚDO */
.content {
  padding: 10px;
  overflow-y: auto;
  flex: 1;
}

/* POSTS */
.post {
  border-bottom: 1px dashed #333;
  margin-bottom: 10px;
  padding-bottom: 10px;
}

/* INPUT */
textarea {
  width: 100%;
  background: black;
  color: #00ffcc;
  border: 1px solid #00ffcc;
  margin-top: 10px;
  font-family: inherit;
}

button {
  width: 100%;
  margin-top: 5px;
  background: black;
  color: #00ffcc;
  border: 1px solid #00ffcc;
  cursor: pointer;
}

/* TASKBAR */
.taskbar {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: #0a0a0a;
  padding: 5px;
  border-top: 1px solid #00ffcc;
  font-size: 14px;
}

/* GLITCH leve */
.glitch {
  text-shadow: 1px 0 #ff00c8, -1px 0 #00ffff;
}

</style>
</head>

<body>

<div class="desktop">

  <!-- ÍCONE -->
  <div class="icon" style="top:40px; left:40px;" onclick="openWin()">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Human_brain.png">
    <div>memories</div>
  </div>

  <!-- JANELA -->
  <div class="window" id="win">
    <div class="header">
      <span class="glitch">memory.log</span>
      <span class="close" onclick="closeWin()">X</span>
    </div>

    <div class="content">
      <div id="posts"></div>

      <textarea id="input" placeholder="escreve..."></textarea>
      <button onclick="addPost()">salvar</button>
    </div>
  </div>

  <!-- BARRA -->
  <div class="taskbar">
    system online // status: instável
  </div>

</div>

<script>
const win = document.getElementById("win");

/* abrir/fechar */
function openWin() {
  win.style.display = "flex";
}

function closeWin() {
  win.style.display = "none";
}

/* posts */
function addPost() {
  const text = document.getElementById("input").value;
  if (!text.trim()) return;

  const post = document.createElement("div");
  post.className = "post";
  post.innerText = text;

  document.getElementById("posts").prepend(post);

  let saved = JSON.parse(localStorage.getItem("posts") || "[]");
  saved.unshift(text);
  localStorage.setItem("posts", JSON.stringify(saved));

  document.getElementById("input").value = "";
}

window.onload = () => {
  let saved = JSON.parse(localStorage.getItem("posts") || "[]");
  saved.forEach(text => {
    const post = document.createElement("div");
    post.className = "post";
    post.innerText = text;
    document.getElementById("posts").appendChild(post);
  });
}

/* arrastar janela */
let isDown = false, offsetX, offsetY;

document.querySelector(".header").onmousedown = (e) => {
  isDown = true;
  offsetX = win.offsetLeft - e.clientX;
  offsetY = win.offsetTop - e.clientY;
};

document.onmouseup = () => isDown = false;

document.onmousemove = (e) => {
  if (!isDown) return;
  win.style.left = e.clientX + offsetX + "px";
  win.style.top = e.clientY + offsetY + "px";
};
</script>

</body>
</html>
