<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>system://core</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #050505;
  font-family: 'VT323', monospace;
  color: #00ffcc;
  overflow: hidden;
}

.desktop {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* ÍCONES */
.icon {
  width: 80px;
  text-align: center;
  cursor: pointer;
  position: absolute;
  color: #888;
  font-size: 28px;
}

.icon:hover {
  color: #00ffcc;
}

/* JANELAS */
.window {
  width: 500px;
  height: 400px;
  background: #0d0d0d;
  border: 1px solid #00ffcc;
  position: absolute;
  top: 80px;
  left: 80px;
  display: none;
  flex-direction: column;
}

.header {
  background: #00ffcc;
  color: black;
  padding: 5px;
  cursor: move;
  display: flex;
  justify-content: space-between;
}

.content {
  padding: 10px;
  overflow-y: auto;
  flex: 1;
}

.post {
  border-bottom: 1px dashed #333;
  margin-bottom: 10px;
  padding-bottom: 10px;
}

textarea {
  width: 100%;
  background: black;
  color: #00ffcc;
  border: 1px solid #00ffcc;
}

button {
  width: 100%;
  margin-top: 5px;
  background: black;
  color: #00ffcc;
  border: 1px solid #00ffcc;
  cursor: pointer;
}

.taskbar {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: #0a0a0a;
  padding: 5px;
  border-top: 1px solid #00ffcc;
}
</style>
</head>

<body>

<div class="desktop">

  <!-- ÍCONES -->
  <div class="icon" style="top:40px; left:40px;" onclick="openWindow('memoria')">I</div>
  <div class="icon" style="top:120px; left:40px;" onclick="openWindow('pensamentos')">II</div>
  <div class="icon" style="top:200px; left:40px;" onclick="openWindow('erros')">III</div>
  <div class="icon" style="top:280px; left:40px;" onclick="openWindow('vazio')">IV</div>

  <!-- JANELA MEMORIA -->
  <div class="window" id="memoria">
    <div class="header">
      memoria.log
      <span onclick="closeWindow('memoria')">X</span>
    </div>
    <div class="content">
      <div id="memoriaPosts"></div>
      <textarea id="memoriaInput"></textarea>
      <button onclick="addPost('memoria')">salvar</button>
    </div>
  </div>

  <!-- JANELA PENSAMENTOS -->
  <div class="window" id="pensamentos">
    <div class="header">
      pensamentos.txt
      <span onclick="closeWindow('pensamentos')">X</span>
    </div>
    <div class="content">
      <div id="pensamentosPosts"></div>
      <textarea id="pensamentosInput"></textarea>
      <button onclick="addPost('pensamentos')">salvar</button>
    </div>
  </div>

  <!-- JANELA ERROS -->
  <div class="window" id="erros">
    <div class="header">
      erros.sys
      <span onclick="closeWindow('erros')">X</span>
    </div>
    <div class="content">
      <div id="errosPosts"></div>
      <textarea id="errosInput"></textarea>
      <button onclick="addPost('erros')">salvar</button>
    </div>
  </div>

  <!-- JANELA VAZIO -->
  <div class="window" id="vazio">
    <div class="header">
      vazio.dat
      <span onclick="closeWindow('vazio')">X</span>
    </div>
    <div class="content">
      <div id="vazioPosts"></div>
      <textarea id="vazioInput"></textarea>
      <button onclick="addPost('vazio')">salvar</button>
    </div>
  </div>

  <div class="taskbar">system online // estados fragmentados</div>

</div>

<script>

/* abrir/fechar */
function openWindow(id) {
  document.getElementById(id).style.display = "flex";
}

function closeWindow(id) {
  document.getElementById(id).style.display = "none";
}

/* salvar posts */
function addPost(tipo) {
  const input = document.getElementById(tipo + "Input");
  const posts = document.getElementById(tipo + "Posts");

  const text = input.value;
  if (!text.trim()) return;

  const post = document.createElement("div");
  post.className = "post";
  post.innerText = text;

  posts.prepend(post);

  let saved = JSON.parse(localStorage.getItem(tipo) || "[]");
  saved.unshift(text);
  localStorage.setItem(tipo, JSON.stringify(saved));

  input.value = "";
}

/* carregar */
window.onload = () => {
  ["memoria", "pensamentos", "erros", "vazio"].forEach(tipo => {
    let saved = JSON.parse(localStorage.getItem(tipo) || "[]");
    saved.forEach(text => {
      const post = document.createElement("div");
      post.className = "post";
      post.innerText = text;
      document.getElementById(tipo + "Posts").appendChild(post);
    });
  });
}
</script>

</body>
</html>
