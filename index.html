<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>memoria_corrompida.exe</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&family=Special+Elite&display=swap" rel="stylesheet">

<link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/3/3c/Human_brain.png">

<style>

body {
  background: #0a0a0a;
  color: #cfcfcf;
  font-family: 'Special Elite', serif;
  display: flex;
  justify-content: center;
  margin: 0;
  overflow-x: hidden;
}

/* glitch fundo leve */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.02) 0px,
    rgba(255,255,255,0.02) 1px,
    transparent 1px,
    transparent 2px
  );
  pointer-events: none;
}

/* container */
.container {
  width: 600px;
  padding: 40px 20px;
}

/* header */
header {
  text-align: center;
  margin-bottom: 40px;
}

header img {
  width: 80px;
  opacity: 0.8;
  filter: contrast(120%);
}

/* glitch texto */
.glitch {
  position: relative;
  font-size: 26px;
  letter-spacing: 2px;
  color: white;
}

.glitch::before,
.glitch::after {
  content: attr(data-text);
  position: absolute;
  left: 0;
}

.glitch::before {
  color: #ff00c8;
  transform: translate(2px, -1px);
  opacity: 0.6;
}

.glitch::after {
  color: #00ff99;
  transform: translate(-2px, 1px);
  opacity: 0.6;
}

.subtitle {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: #555;
}

/* posts */
.post {
  border-left: 2px solid #333;
  padding: 15px;
  margin-bottom: 25px;
  transition: 0.3s;
}

.post:hover {
  border-left: 2px solid #ff00c8;
  background: rgba(255,255,255,0.02);
}

.date {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: #666;
  margin-bottom: 8px;
}

.content {
  font-size: 15px;
  line-height: 1.6;
}

/* input */
textarea {
  width: 100%;
  height: 90px;
  background: #111;
  color: #ccc;
  border: 1px solid #333;
  padding: 10px;
  margin-top: 20px;
  font-family: 'IBM Plex Mono', monospace;
}

/* botão */
button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  background: #111;
  color: #777;
  border: 1px solid #333;
  cursor: pointer;
}

button:hover {
  color: #00ff99;
  border-color: #00ff99;
}

/* efeito piscando aleatório */
@keyframes flicker {
  0% { opacity: 1; }
  50% { opacity: 0.6; }
  100% { opacity: 1; }
}

.flicker {
  animation: flicker 2s infinite;
}

footer {
  text-align: center;
  margin-top: 40px;
  font-size: 10px;
  color: #333;
}

</style>
</head>

<body>

<div class="container">

<header>
  <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Human_brain.png">
  <h1 class="glitch" data-text="memoria_corrompida.exe">memoria_corrompida.exe</h1>
  <p class="subtitle">logs internos // instável</p>
</header>

<div id="posts"></div>

<textarea id="input" placeholder="escreve algo..."></textarea>
<button onclick="addPost()">registrar</button>

<footer class="flicker">
  sistema emocional não confiável
</footer>

</div>

<script>
function addPost() {
  const text = document.getElementById("input").value;
  if (!text.trim()) return;

  const date = new Date().toLocaleString();

  const post = document.createElement("div");
  post.className = "post";
  post.innerHTML = `
    <div class="date">${date}</div>
    <div class="content">${text}</div>
  `;

  document.getElementById("posts").prepend(post);

  let saved = JSON.parse(localStorage.getItem("posts") || "[]");
  saved.unshift({text, date});
  localStorage.setItem("posts", JSON.stringify(saved));

  document.getElementById("input").value = "";
}

window.onload = () => {
  let saved = JSON.parse(localStorage.getItem("posts") || "[]");
  saved.forEach(p => {
    const post = document.createElement("div");
    post.className = "post";
    post.innerHTML = `
      <div class="date">${p.date}</div>
      <div class="content">${p.text}</div>
    `;
    document.getElementById("posts").appendChild(post);
  });
}
</script>

</body>
</html>
